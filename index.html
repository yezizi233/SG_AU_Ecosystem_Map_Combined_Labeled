            allLatLngs.push(item.coords);
        });

        if (allLatLngs.length > 0) { var bounds = L.latLngBounds(allLatLngs); map.fitBounds(bounds.pad(0.15)); }

        L.control.layers(null, {
            'A. 研发园区': layers['A'],
            'B. 孵化器/加速器': layers['B'],
            'C. 投资机构': layers['C'],
            'D. 现有客户': layers['D']
        }, {collapsed: false}).addTo(map);


        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<b>图例</b><br>';
            div.innerHTML += '<i style="background: #E41A1C"></i> A. 研发园区<br>';
            div.innerHTML += '<i style="background: #377EB8"></i> B. 孵化器/加速器<br>';
            div.innerHTML += '<i style="background: #4DAF4A"></i> C. 投资机构<br>';
            div.innerHTML += '<i style="background: #FF7F00"></i> D. 现有客户<br>';
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
